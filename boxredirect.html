<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Box Login Redirect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 40px;
            color: #333;
        }
    </style>
</head>
<body>
    <p>Login successful. You can close this window.</p>

    <script>
        // Extract the ?code= parameter from the URL
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");

        // 1) Trigger the deep link back to the app
        if (code) {
            window.location.href = "myturntable://boxauth?code=" + code;
        }

        // 2) Try to close the window (may fail on iOS/Android)
        setTimeout(() => {
            window.close();
        }, 1200);

        // 3) Fallback: navigate back so the user doesn't stay stuck
        // Works on Android, sometimes on iOS
        setTimeout(() => {
            history.go(-1);
        }, 2200);

        // 4) Final fallback: redirect to a neutral page
        // Ensures the user never stays on this redirect page
        setTimeout(() => {
            window.location.href = "https://account.box.com/logout";
        }, 3500);
    </script>
</body>
</html>
