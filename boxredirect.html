<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Box Login Redirect</title>
</head>
<body>
    <p>You can close this window.</p>

    <script>
        // 1) Extract auth code
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");

        // 2) Call the app via deep link
        if (code) {
            window.location.href = "myturntable://boxauth?code=" + code;
        }

        // 3) Close browser window after a safe delay
        setTimeout(() => {
            window.close();
        }, 1500);
    </script>
</body>
</html>
